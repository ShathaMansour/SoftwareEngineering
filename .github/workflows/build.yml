name: Build & Test

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore StarterApp.sln

      - name: Build Database project
        run: dotnet build StarterApp.Database/StarterApp.Database.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test StarterApp.Tests/StarterApp.Tests.csproj --configuration Release --no-restore --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: '**/coverage.cobertura.xml'
